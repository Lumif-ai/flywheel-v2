{% extends "base.html" %}
{% block title %}Sign In - Flywheel{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card card">
    <h2 class="text-center">Sign In</h2>
    <p class="text-secondary text-center mt-1">Enter your user ID to continue.</p>
    <form action="/auth/login" method="post" class="mt-3">
      <div class="form-group">
        <label for="user_id" class="form-label">User ID</label>
        <input type="text" id="user_id" name="user_id" class="form-input" placeholder="Enter your user ID" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
    </form>
    <p class="auth-note">This is a development stub. OAuth comes in Phase 11B.</p>
  </div>
</div>
{% endblock %}
