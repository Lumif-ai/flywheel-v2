<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Flywheel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/flywheel.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/outputs.css">
  <link rel="stylesheet" href="/static/css/agenda.css">
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/htmx-ext-sse.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="app-layout">
  {% include "components/sidebar.html" %}

  <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="Open menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <main class="content-area" id="content-area">
    {% block content %}{% endblock %}
  </main>

  {% include "components/command_bar.html" %}
  <script src="/static/js/command-bar.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script>commandBar.init();</script>

  {% block scripts %}{% endblock %}
</body>
</html>
