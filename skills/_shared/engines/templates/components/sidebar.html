<!-- Sidebar Component -->
<aside class="sidebar" id="sidebar" data-collapsed="false">
  <div class="sidebar-header">
    <a href="/agenda" class="sidebar-brand">
      <svg class="sidebar-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      <span class="sidebar-brand-text sidebar-link-text">flywheel</span>
    </a>
  </div>

  <nav class="sidebar-nav" hx-boost="true" hx-target="#content-area" hx-push-url="true" hx-swap="innerHTML swap:100ms settle:100ms transition:true">
    <a href="/agenda" class="sidebar-link {% if active_page == 'agenda' %}active{% endif %}">
      <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
      </svg>
      <span class="sidebar-link-text">Agenda</span>
      {% if agenda_count %}<span class="sidebar-badge">{{ agenda_count }}</span>{% endif %}
    </a>

    <a href="/companies" class="sidebar-link {% if active_page == 'companies' %}active{% endif %}">
      <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>
      </svg>
      <span class="sidebar-link-text">Companies</span>
    </a>

    <a href="/skills" class="sidebar-link {% if active_page == 'skills' %}active{% endif %}">
      <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span class="sidebar-link-text">Skills</span>
    </a>

    <a href="/dashboard" class="sidebar-link {% if active_page == 'dashboard' %}active{% endif %}">
      <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
      <span class="sidebar-link-text">Context Health</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <a href="/integrations" class="sidebar-link sidebar-link-settings {% if active_page == 'integrations' %}active{% endif %}">
      <svg class="sidebar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <span class="sidebar-link-text">Settings</span>
    </a>

    {% if current_user %}
    <div class="sidebar-user">
      <span class="sidebar-user-avatar">{{ current_user.user_id[0]|upper }}</span>
      <span class="sidebar-user-name sidebar-link-text">{{ current_user.user_id }}</span>
    </div>
    {% endif %}

    <div class="sidebar-footer-actions">
      <button class="sidebar-collapse-toggle" onclick="toggleSidebar()" title="Toggle sidebar ([)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/>
        </svg>
      </button>
      <span class="sidebar-cmdk sidebar-link-text" onclick="commandBar.open()">
        <kbd>&#8984;K</kbd>
      </span>
    </div>
  </div>
</aside>
