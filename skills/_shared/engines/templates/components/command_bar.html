<!-- Command Bar (Cmd+K) -->
<div id="command-bar-overlay" class="cb-overlay" role="dialog" aria-label="Command bar" aria-modal="true">
  <div class="cb-container">
    <div class="cb-header">
      <div class="cb-input-wrap">
        <svg class="cb-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input
          id="command-bar-input"
          type="text"
          class="cb-input"
          placeholder="Search skills, work items, actions..."
          autocomplete="off"
          aria-label="Search commands"
        />
      </div>
    </div>
    <ul id="command-bar-results" class="cb-results" role="listbox"></ul>
    <div class="cb-footer">
      <span class="cb-hint"><kbd>Esc</kbd> to close</span>
      <span class="cb-hint"><kbd>&uarr;&darr;</kbd> navigate</span>
      <span class="cb-hint"><kbd>Enter</kbd> select</span>
    </div>
  </div>
</div>
