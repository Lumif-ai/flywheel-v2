<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Flywheel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/flywheel.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/outputs.css">
  <link rel="stylesheet" href="/static/css/crawl.css">
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/htmx-ext-sse.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="fullscreen-layout">
  <main class="fullscreen-content">
    {% block content %}{% endblock %}
  </main>

  {% include "components/command_bar.html" %}
  <script src="/static/js/command-bar.js"></script>
  <script>commandBar.init();</script>

  {% block scripts %}{% endblock %}
</body>
</html>
